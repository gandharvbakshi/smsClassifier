name: Release to Play Store

# Trigger on a version tag push (e.g. `git tag v1.0.12 && git push --tags`)
# OR via the manual "Run workflow" button in the GitHub Actions UI.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to release to'
        required: true
        default: 'beta'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # ---- Materialize the release keystore from a base64-encoded secret ----
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "DEBUG: KEYSTORE_BASE64 length = ${#KEYSTORE_BASE64} chars (expect ~3500)"
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "FATAL: RELEASE_KEYSTORE_BASE64 secret is empty."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
          echo "Wrote app/release-keystore.jks ($(stat -c%s app/release-keystore.jks) bytes)"

      # ---- Write keystore.properties (consumed by app/build.gradle.kts) ----
      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=app/release-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # ---- Write Play Developer API service-account JSON ----
      - name: Write play-publisher.json
        env:
          PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "DEBUG: PLAY_SA_JSON length = ${#PLAY_SA_JSON} chars (expect ~2300)"
          if [ -z "$PLAY_SA_JSON" ]; then
            echo "FATAL: PLAY_SERVICE_ACCOUNT_JSON secret is empty."
            exit 1
          fi
          printf '%s' "$PLAY_SA_JSON" > app/play-publisher.json
          echo "Wrote app/play-publisher.json ($(stat -c%s app/play-publisher.json) bytes)"

      # ---- Determine track ----
      - name: Resolve track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "track=${{ inputs.track }}" >> $GITHUB_OUTPUT
          else
            # Open testing in Play Console = Publishing API track "beta"
            echo "track=beta" >> $GITHUB_OUTPUT
          fi
          echo "Will release to track: $(grep '^track=' $GITHUB_OUTPUT | cut -d= -f2)"

      # ---- Build + upload AAB ----
      - name: Publish release bundle
        run: ./gradlew publishReleaseBundle --track=${{ steps.track.outputs.track }} --no-daemon --stacktrace

      # ---- Cleanup secrets from runner disk (defense in depth; runner is
      # ephemeral but still good hygiene) ----
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f app/release-keystore.jks keystore.properties app/play-publisher.json
