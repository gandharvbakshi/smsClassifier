mode: user
target_user_profile:
  id: everyday_sms_user
  language_register: consumer
  natural_terms:
  - OTP
  - SMS
  - KYC
  avoid_terms:
  - risk signals
  - intent
  - classification
  - classifier output
personas:
- id: otp_pressure_user
  name: User under OTP pressure
  description: Receives an OTP while someone asks them to share the code quickly.
- id: cautious_link_reviewer
  name: Cautious SMS link reviewer
  description: Wants help spotting risky text requests before tapping or sharing information.
moments:
- id: caller_claims_delivery_otp
  trigger: A caller says an OTP is for delivery or another harmless action.
  pressure_or_confusion: The SMS is real, but the caller story may be false.
- id: unexpected_kyc_reward_text
  trigger: A reward/KYC text asks the user to act quickly.
  pressure_or_confusion: The request feels urgent enough to tap before reviewing.
features:
- id: otp_intent_detection
  mechanism: Classifies the apparent purpose of an OTP, such as account change, login,
    delivery, bank/card, UPI, or KYC/e-sign.
  decision_enabled: Compare what the app shows with what the caller says.
  bad_outcome_defeated: Sharing a sensitive code under a false pretext.
  outcome_type: fraud_loss_avoidance
  claim_boundary: Shows a purpose signal; does not guarantee fraud prevention.
  evidence_refs:
  - model_metadata.json otp_intent classes
  - HeuristicOtpClassifier.detectIntent
  - owner positioning correction
  confidence: owner_confirmed
  so_what_ladder:
  - The user sees what the OTP appears to be for.
  - The caller story and app-shown purpose can be compared.
  - The user can catch a mismatch before sharing a sensitive code.
- id: risky_message_review
  mechanism: Classifies risky-looking SMS requests and review-needed messages when
    classification data supports it.
  decision_enabled: Notice that a KYC/reward text deserves review before tapping.
  bad_outcome_defeated: Acting too quickly on a risky SMS link or information request.
  outcome_type: risk_reduction
  claim_boundary: Highlights review signals; does not guarantee every scam is caught.
  evidence_refs:
  - store listing scam awareness language
  - Prediction.isPhishing and phishScore
  confidence: source_confirmed
  so_what_ladder:
  - The user sees the app flag a text for review.
  - They understand the request may be risky before acting.
  - They reduce exposure to scam-like prompts and sensitive-data mistakes.
scenarios:
- id: delivery_story_account_change_code
  persona_id: otp_pressure_user
  moment_id: caller_claims_delivery_otp
  feature_id: otp_intent_detection
  user_belief: The caller says the OTP is for delivery.
  actual_risk: The code appears to relate to account change.
  product_intervention: SMS Classifier shows account change for the code purpose.
  outcome_type: fraud_loss_avoidance
  so_what_ladder:
  - The app shows what the OTP appears to be for.
  - The delivery story and account-change signal do not match.
  - The user can catch the mismatch before sharing the code.
- id: unexpected_kyc_reward_link
  persona_id: cautious_link_reviewer
  moment_id: unexpected_kyc_reward_text
  feature_id: risky_message_review
  user_belief: The prize/KYC text may be legitimate.
  actual_risk: The text may be a risky information request.
  product_intervention: SMS Classifier flags the KYC request for review.
  outcome_type: risk_reduction
  so_what_ladder:
  - The app flags the text for review.
  - The user sees the KYC request deserves caution before tapping.
  - The user is less likely to rush into a risky SMS request.
baselines:
- id: stock_messages
  name: Stock SMS app
  product_difference: Shows message text, but not the same OTP-purpose/risk decision
    aid.
