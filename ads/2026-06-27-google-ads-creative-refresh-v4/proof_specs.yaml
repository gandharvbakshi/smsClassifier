proofs:
- id: proof_scam_prize_warning
  source: screenshots/proof_scam_prize_warning.png
  proof_type: synthetic_ad_scale_product_ui
  synthetic_data: true
  max_visible_rows: 2
  highlighted_state: Prize SMS text asks for bank details through a suspicious short link
  intended_proof_moment: The app warns before a prize SMS asks for bank details.
  required_visible_text:
  - "Prize text says \u20B950,000"
  - Bank details requested
  - Suspicious link
  forbidden_surfaces:
  - settings
  - debug
  - fake_os_alert
  - real_bank_brand
  - real_url
  - real_otp
  crop_pct:
    top: 0
    right: 0
    bottom: 24
    left: 0
  focus_pct:
    x: 50
    y: 40
  ad_scale_readability: thumbnail_safe
  proof_typography:
    min_important_text_px: 52
    max_visible_text_blocks: 3
    max_words_per_block: 6
  product_surface: sms_review_screen
  visual_adds: Shows a realistic prize-SMS risk cue with the product warning state.
  context_type: realistic_sms_review_state
  contrast_checks:
  - fg: '#102033'
    bg: '#FFF7ED'
    min_ratio: 4.5
  - fg: '#FFFFFF'
    bg: '#C2410C'
    min_ratio: 4.5
