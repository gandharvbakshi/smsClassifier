proofs:
- id: otp_app_shows_account_change
  screenshot_id: otp_app_shows_account_change
  source: screenshots/otp_app_shows_account_change.png
  intended_proof_moment: SMS Classifier shows account change while the claimed reason
    is delivery OTP.
  synthetic_data: true
  max_visible_rows: 2
  required_visible_text:
  - Delivery OTP
  - Account change
  - Story doesn't match
  required_chips: []
  forbidden_surfaces:
  - settings
  - debug
  - cloud checks
  - real phone number
  - real OTP
  crop_pct: &id001
    x: 0
    y: 0
    w: 100
    h: 42
  focus_pct: *id001
  proof_type: synthetic_ui_proof
  highlighted_state: Delivery OTP, Account change, and Story doesn't match are readable
    at mobile scale with high contrast.
  contrast_checks:
  - label: delivery_otp
    fg: '#075EAD'
    bg: '#EAF4FF'
    min_ratio: 4.5
  - label: story_mismatch
    fg: '#7F1D1D'
    bg: '#EAF4FF'
    min_ratio: 4.5
  - label: body_text
    fg: '#102033'
    bg: '#EAF4FF'
    min_ratio: 4.5
- id: kyc_app_flags_review
  screenshot_id: kyc_app_flags_review
  source: screenshots/kyc_app_flags_review.png
  intended_proof_moment: SMS Classifier warns before a prize text asking for KYC is
    tapped.
  synthetic_data: true
  max_visible_rows: 2
  required_visible_text:
  - Prize text
  - Confirm KYC
  - Review before tap
  required_chips: []
  forbidden_surfaces:
  - settings
  - debug
  - cloud checks
  - real phone number
  - live URL
  crop_pct: *id001
  focus_pct: *id001
  proof_type: synthetic_ui_proof
  highlighted_state: Confirm KYC and Review before tap are readable at mobile scale
    with high contrast.
  contrast_checks:
  - label: confirm_kyc
    fg: '#7F1D1D'
    bg: '#FEF2F2'
    min_ratio: 4.5
  - label: body_text
    fg: '#102033'
    bg: '#FEF2F2'
    min_ratio: 4.5
