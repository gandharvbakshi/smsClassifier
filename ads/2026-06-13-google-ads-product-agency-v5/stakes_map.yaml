target_user_profile:
  id: everyday_sms_user
  name: Everyday SMS user
  summary: A non-technical phone user who receives OTPs, bank/service SMS, delivery
    messages, and occasional suspicious prize/KYC texts.
  language_register: consumer
  natural_terms:
  - OTP
  - SMS
  - KYC
  - delivery
  - account change
  - warning
  - text
  - asks for
  avoid_terms:
  - risk signals
  - intent
  - classification
  - classifier output
  - purpose mismatch
  pain_points:
  - may be pressured to share OTPs
  - may tap suspicious KYC links
  - stock messages app does not explain the story mismatch
personas:
- id: otp_pressure_user
  name: OTP pressure user
  description: Gets a call or message asking for a code.
- id: cautious_link_reviewer
  name: Cautious link reviewer
  description: Receives urgent reward/KYC SMS requests.
moments:
- id: caller_claims_delivery_otp
  trigger: Caller says the OTP is for delivery.
- id: unexpected_kyc_reward_text
  trigger: Prize text asks the user to confirm KYC.
features:
- id: otp_intent_detection
  mechanism: Shows what an OTP appears to be for.
  outcome_type: fraud_loss_avoidance
  so_what_ladder:
  - The app shows the code purpose.
  - The story and code can be compared.
  - The user can avoid sharing a code under a false pretext.
- id: risky_message_review
  mechanism: Warns before suspicious SMS actions.
  outcome_type: risk_reduction
  so_what_ladder:
  - The app warns on the risky request.
  - The user sees the warning before tapping.
  - The user can slow down before a scam-like prompt.
scenarios:
- id: delivery_story_account_change_code
  user_belief: The OTP is for delivery.
  actual_risk: The code appears related to account change.
  product_intervention: SMS Classifier shows account change.
  outcome_type: fraud_loss_avoidance
  so_what_ladder:
  - The app shows account change.
  - The delivery story does not match.
  - The user can avoid sharing the code under pressure.
- id: unexpected_kyc_reward_link
  user_belief: The prize SMS may be real.
  actual_risk: The KYC request may be scam-like.
  product_intervention: SMS Classifier warns before tapping.
  outcome_type: risk_reduction
  so_what_ladder:
  - The app warns on the KYC request.
  - The user sees the risk before tapping.
  - The user can avoid rushing into a suspicious link.
